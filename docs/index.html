<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CC 学习成就地图</title>
<meta name="description" content="Anthropic 官方课程学习旅程的星空可视化：知识点是星星，课程是星座，项目是行星。">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌌</text></svg>">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="preview-banner" class="preview-banner" hidden>
  <span id="preview-banner-text"></span>
  <button id="clear-preview" type="button">清除预览</button>
</div>

<header class="site-header">
  <button id="switch-provider" class="switch-btn" type="button"></button>
  <p class="eyebrow" id="eyebrow">ANTHROPIC SKILLJAR · 2026</p>
  <h1>CC 学习成就地图</h1>
  <p class="subtitle">知识点是星星，课程是星座，项目是行星 —— 学完一个，点亮一颗。</p>
  <p class="progress-line">
    <span class="mono" id="stat-stars">— / — 颗星已点亮</span>
    <span class="sep">·</span>
    <span class="mono" id="stat-courses">— / — 门课完成</span>
    <span class="sep">·</span>
    <span class="mono" id="stat-projects">— / — 个项目达成</span>
  </p>
</header>

<nav class="tabs" role="tablist" aria-label="视图切换">
  <button role="tab" aria-selected="true" aria-controls="view-starmap" id="tab-starmap" type="button">✦ 星图</button>
  <button role="tab" aria-selected="false" aria-controls="view-projects" id="tab-projects" type="button">◉ 项目</button>
  <button role="tab" aria-selected="false" aria-controls="view-list" id="tab-list" type="button">☰ 列表</button>
</nav>

<main>
  <section id="view-starmap" role="tabpanel" aria-labelledby="tab-starmap">
    <div class="starmap-wrap">
      <svg id="starmap" viewBox="0 0 1200 980" role="img" aria-label="课程星图：按三个梯队分区的知识点星座"></svg>
    </div>
    <p class="map-legend">
      <span class="lg"><span class="dot done t1"></span>已点亮</span>
      <span class="lg"><span class="dot preview"></span>预览点亮（未保存）</span>
      <span class="lg"><span class="dot todo"></span>未点亮</span>
      <span class="lg hint">点击星星查看知识点详情，通过测验点亮；正式点亮请告诉 Claude</span>
    </p>
  </section>

  <section id="view-projects" role="tabpanel" aria-labelledby="tab-projects" hidden>
    <div id="projects-track" class="projects-track"></div>
  </section>

  <section id="view-list" role="tabpanel" aria-labelledby="tab-list" hidden>
    <div id="list-root" class="list-root"></div>
  </section>
</main>

<section class="heatmap-panel">
  <h2>学习足迹 · GitHub 贡献</h2>
  <p class="mono" id="heatmap-total">正在读取 @XingZengJi 的贡献数据…</p>
  <div class="heatmap-scroll">
    <div id="heatmap"></div>
  </div>
</section>

<footer class="site-footer">
  <a href="https://github.com/XingZengJi/ai-learn">学习仓库</a>
  <span id="plan-link-wrap"><span class="sep">·</span><a href="https://github.com/XingZengJi/ai-learn/blob/main/%E5%AD%A6%E4%B9%A0%E8%AE%A1%E5%88%92.md">学习计划</a></span>
  <span class="sep">·</span>
  <a href="https://anthropic.skilljar.com/" id="source-link">Anthropic 课程</a>
</footer>

<div id="k-modal" class="k-modal" hidden>
  <div class="k-modal-backdrop"></div>
  <div class="k-modal-box" role="dialog" aria-modal="true" aria-labelledby="k-modal-title">
    <button class="k-modal-close" type="button" aria-label="关闭">×</button>
    <div class="k-modal-body"></div>
  </div>
</div>

<div id="tooltip" class="tooltip" hidden></div>

<script src="js/starmap.js"></script>
<script src="js/quiz.js"></script>
<script src="js/heatmap.js"></script>
<script src="js/app.js"></script>
</body>
</html>
